name: CI

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest

  build-and-run:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t qr-code-app .

      - name: Generate QR code
        run: |
          mkdir -p qr_codes
          docker run --rm \
            -v "${{ github.workspace }}/qr_codes:/app/qr_codes" \
            qr-code-app --url https://nicotroia.com

      - name: Upload QR code artifact
        uses: actions/upload-artifact@v4
        with:
          name: qr-code
          path: qr_codes/
